<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="100%" stop-color="#161b22" />
    </linearGradient>

    <!-- AI Accent Gradient (GitHub/Anthropic inspired Blue to Purple) -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff" />
      <stop offset="100%" stop-color="#a371f7" />
    </linearGradient>

    <!-- Glow Filter for Active AI Node -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Subtle Technical Background Grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.04"/>
    </pattern>

    <!-- Mask to fade the grid out on the left side -->
    <mask id="gridMask">
      <linearGradient id="maskGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="40%" stop-color="#000000" />
        <stop offset="90%" stop-color="#ffffff" />
      </linearGradient>
      <rect width="800" height="340" fill="url(#maskGrad)" />
    </mask>
  </defs>

  <!-- Base Layer -->
  <rect width="800" height="340" rx="16" fill="url(#bg)"/>
  <rect width="800" height="340" rx="16" fill="url(#grid)" mask="url(#gridMask)"/>

  <!-- Subtle Top Highlight for 3D effect -->
  <rect x="1" y="1" width="798" height="338" rx="15" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.05"/>
  <rect x="0" y="0" width="800" height="340" rx="16" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Left Side: Typography & Branding -->
  <g transform="translate(60, 130)">
    
    <!-- DayOps Logo (Sun/Day + Checkmark/Ops) -->
    <g transform="translate(0, -65)">
      <circle cx="20" cy="20" r="10" fill="#0d1117" stroke="#8b949e" stroke-width="2"/>
      <!-- Sun Rays -->
      <path d="M20 5 v3 M20 35 v-3 M5 20 h3 M35 20 h-3 M28.5 11.5 L30.6 9.4 M28.5 28.5 L30.6 30.6 M11.5 28.5 L9.4 30.6 M11.5 11.5 L9.4 9.4" stroke="#8b949e" stroke-width="2" stroke-linecap="round"/>
      <!-- Checkmark -->
      <path d="M14 20 l4 4 l8 -8" stroke="url(#accentGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <!-- Title -->
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="#ffffff" letter-spacing="-1.5">Day<tspan fill="url(#accentGrad)">Ops</tspan></text>
    
    <!-- Tagline -->
    <text x="0" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#8b949e" letter-spacing="0.2">Your AI operations center for the workday</text>

    <!-- Command Trigger -->
    <g transform="translate(0, 55)">
      <rect width="115" height="34" rx="17" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <text x="16" y="22" font-family="monospace" font-size="14" fill="#8b949e">&gt;<tspan fill="url(#accentGrad)" dx="8">/morning</tspan></text>
    </g>

    <!-- Integrations -->
    <text x="0" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#8b949e" letter-spacing="1">INTEGRATES WITH</text>
    <g transform="translate(0, 145)">
      <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#8b949e">
        <tspan fill="#c9d1d9">Jira</tspan>
        <tspan dx="8" fill="#30363d">•</tspan>
        <tspan dx="8" fill="#c9d1d9">Teams</tspan>
        <tspan dx="8" fill="#30363d">•</tspan>
        <tspan dx="8" fill="#c9d1d9">Outlook</tspan>
        <tspan dx="8" fill="#30363d">•</tspan>
        <tspan dx="8" fill="#c9d1d9">Tempo</tspan>
      </text>
    </g>
  </g>

  <!-- Flow Connection (Linking `/morning` command to the generated timeline) -->
  <path d="M 180 202 C 280 202, 360 79, 465 79" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.4"/>
  <polygon points="460,76 466,79 460,82" fill="url(#accentGrad)" opacity="0.4"/>
  
  <!-- Flow Particles -->
  <circle cx="245" cy="185" r="1.5" fill="url(#accentGrad)" opacity="0.8"/>
  <circle cx="320" cy="140" r="2" fill="url(#accentGrad)" opacity="0.9"/>
  <circle cx="395" cy="95" r="1.5" fill="url(#accentGrad)" opacity="0.7"/>

  <!-- Right Side: Abstract Daily Timeline -->
  <g transform="translate(440, 45)">
    <!-- Main Vertical Timeline Line -->
    <line x1="30" y1="34" x2="30" y2="227" stroke="#30363d" stroke-width="2"/>

    <!-- Block 1: Morning Briefing -->
    <g transform="translate(60, 10)">
      <rect width="260" height="48" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <circle cx="20" cy="24" r="5" fill="#a371f7"/>
      <text x="38" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#c9d1d9">Morning Briefing</text>
      <text x="38" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e">Calendar • Teams • Jira</text>
      <text x="215" y="28" font-family="monospace" font-size="12" fill="#8b949e">09:00</text>
      
      <path d="M-30 24 L0 24" stroke="#30363d" stroke-width="2"/>
      <circle cx="-30" cy="24" r="4" fill="#30363d"/>
    </g>

    <!-- Block 2: Meeting Budget Check (Skipped) -->
    <g transform="translate(60, 72)">
      <rect width="260" height="42" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1" stroke-dasharray="4 4"/>
      <circle cx="20" cy="21" r="5" fill="#f85149" fill-opacity="0.5"/>
      <text x="38" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#8b949e" text-decoration="line-through">Sync (Over Budget)</text>
      <text x="38" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e" font-style="italic">Skipped to preserve focus</text>
      <text x="215" y="25" font-family="monospace" font-size="12" fill="#8b949e">10:00</text>
      
      <path d="M-30 21 L0 21" stroke="#30363d" stroke-width="2"/>
      <circle cx="-30" cy="21" r="4" fill="#30363d"/>
    </g>

    <!-- Block 3: AI-Scheduled Focus Block (Active) -->
    <g transform="translate(60, 128)">
      <rect width="260" height="64" rx="8" fill="url(#accentGrad)" opacity="0.1" filter="url(#glow)"/>
      <rect width="260" height="64" rx="8" fill="#141124" stroke="url(#accentGrad)" stroke-width="1.5"/>
      <circle cx="20" cy="32" r="5" fill="#58a6ff"/>
      <text x="38" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#ffffff">Focus: API Architecture</text>
      <text x="38" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e">Project A • Deep work block</text>
      
      <rect x="200" y="22" width="45" height="20" rx="4" fill="#58a6ff" fill-opacity="0.15" stroke="#58a6ff" stroke-width="1" stroke-opacity="0.3"/>
      <text x="210" y="36" font-family="monospace" font-size="11" font-weight="600" fill="#58a6ff">2.0h</text>
      
      <path d="M-30 32 L0 32" stroke="url(#accentGrad)" stroke-width="2"/>
      
      <!-- Glowing AI 'Agent' Node currently positioned here -->
      <circle cx="-30" cy="32" r="8" fill="url(#accentGrad)" filter="url(#glow)"/>
      <circle cx="-30" cy="32" r="3" fill="#ffffff"/>
    </g>

    <!-- Block 4: Auto Time Logging -->
    <g transform="translate(60, 206)">
      <rect width="260" height="42" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <circle cx="20" cy="21" r="5" fill="#3fb950"/>
      <text x="38" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#c9d1d9">Auto-log to Tempo</text>
      <text x="38" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e">Pre-filled &amp; submitted via API</text>
      <text x="215" y="25" font-family="monospace" font-size="12" fill="#8b949e">17:00</text>
      
      <path d="M-30 21 L0 21" stroke="#30363d" stroke-width="2"/>
      <circle cx="-30" cy="21" r="4" fill="#30363d"/>
    </g>
  </g>
</svg>