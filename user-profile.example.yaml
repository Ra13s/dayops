# Day Planner Agent — User Profile
# Generated by the onboarding interview. You can also edit manually.
# Copy this file to user-profile.yaml and fill in your details.

# === Platform & Language ===
platform: "windows"    # windows | mac | linux (auto-detected during onboarding)
language: "en"         # Language for generated plan text (en, et, de, etc.)
                       # Original content (Teams messages, emails) shown as-is, never translated.
timezone: "Europe/Tallinn"  # IANA timezone (auto-detected, but set explicitly for reliability)
                            # Used by HTTP calendar path to request local times from Outlook API.

# === Personal ===
name: "Your Name"
work_hours:
  earliest_start: "09:40"    # when you first go online (e.g., from transport)
  office_arrival: "10:00"    # when you're at desk, flexible
  end: "17:45"               # when you usually leave, flexible
  evening_focus: false        # set true if you sometimes work from home in evening
lunch:
  time: "12:00"
  duration_min: 20
meeting_budget_hours: 2.5
country: "EE"  # for public holiday detection

# Energy profile — determines what kind of work fits each part of the day
# Options: "comms", "warm-up", "peak", "winding-down", "focus"
#
# comms: join standups from phone, check messages (transport time)
# warm-up: small TODOs, replies, unblocking others, questions
# peak: deep work, architecture, analysis, writing specs
# winding-down: meetings, reviews, lighter tasks
# focus: optional evening deep work from home
energy_profile:
  transport: "comms"      # earliest_start to office_arrival
  morning: "warm-up"      # office_arrival to lunch
  afternoon: "peak"       # after lunch — best for focus blocks
  late: "winding-down"    # last hour before end
  evening: "focus"        # optional, from home

# === Projects ===
# allocation is % of monthly work hours
# keywords are matched case-insensitively against meeting subjects
# jira_cloud_id + jira_projects are used for Jira MCP queries
projects:
  # Example:
  # MyProject:
  #   allocation: 50
  #   strategy: daily          # daily | session | as-needed | reactive
  #   keywords: ["MyProject", "MP-"]
  #   jira_cloud_id: "your-cloud-id"
  #   jira_projects: ["MP"]
  #
  # SmallProject:
  #   allocation: 15
  #   strategy: session
  #   focus_days: [Tue, Thu]   # batch deep work into these days
  #   keywords: ["SmallProj"]
  #
  # Strategy options:
  #   daily     — meaningful work every day (50%+ projects)
  #   session   — batch into focus_days, otherwise only unblock others (15-30%)
  #   as-needed — some weeks zero, some weeks full day (5-15%, flex)
  #   reactive  — respond when asked, no proactive work (<5%)
  #   jira_projects: ["MP"]

# === Organizer to Project Mapping ===
# When meeting subject keywords don't match, fall back to organizer name
organizer_projects: {}
  # Example:
  # "John Smith": MyProject
  # "Jane Doe": OtherProject

# === Standup Attendance Schedule ===
# For recurring daily meetings, configure which days to attend
standup_schedule: {}
  # Example:
  # "MyProject Daily":
  #   attend_days: [Tue, Thu]
  #   action_on_skip: "check async notes in Teams"

# === Conditional Meetings ===
# Meetings where attendance depends on a condition
conditional_meetings: {}
  # Example:
  # "Backlog Refinement":
  #   condition: check_jira
  #   query: "assignee = currentUser() AND project = MP AND status = 'Ready for refinement'"
  #   attend_if: has_results
  #   skip_message: "No tasks to refine — skipping"
  # "Architecture Review":
  #   condition: check_agenda
  #   attend_if: "agenda contains topic needing my input"
  #   actual_duration_min: 20  # booked 60m, actually ~20m

# === Meeting Duration Overrides ===
# When meetings consistently end earlier than booked
meeting_actual_duration: {}
  # Example:
  # "Weekly Sync": 30  # booked 60m, actually 30m

# === Meeting Prep Time ===
# Meetings that need preparation (added to meeting cost)
meeting_prep_time: {}
  # Example:
  # "Architecture Review": 15  # 15 minutes prep

# === Room Booking Detection ===
# Patterns to detect room bookings (excluded from meeting analysis)
room_booking_patterns: []
  # Example:
  # - "rbron"
  # - "conference room"

# === Noise Filters ===
# Email patterns to filter before analysis
noise_filters:
  - sender_contains: "gitlab"
    action: ignore
    reason: "Duplicated in Teams"
  - sender_contains: "confluence"
    subject_contains: "digest"
    action: low_priority
    reason: "Automated digest"
  - sender_contains: "(Jira)"
    action: summarize
    reason: "Jira notification"
  - sender_contains: "[JIRA]"
    action: summarize
    reason: "Jira notification"

# === People (for delegation suggestions) ===
people: []
  # Example:
  # - name: "John Smith"
  #   role: "senior developer"
  #   project: "MyProject"
  #   expertise: "backend, APIs"

# === Expertise Profile ===
# Your expertise areas — used to match implicit questions in group chats
expertise: []
  # Example:
  # - "System architecture"
  # - "API design"
  # - "DevOps and infrastructure"

# === Time Off ===
# Manual time-off entries (agent also detects all-day calendar events)
time_off: []
  # Example:
  # - date: 2026-04-03
  #   type: leave

# === Shortened Days ===
shortened_days: []
  # Example:
  # - date: 2026-06-22
  #   hours: 6

# === Tempo Time Logging ===
tempo:
  atlassian_account_id: "your-atlassian-account-id"

  # Per-project time logging rules
  # Each project may have different conventions
  projects: {}
    # Example:
    # MyProject:
    #   tempo_task_default: "PROJ-17"          # Jira issue to log against
    #   tempo_task_meetings: "PROJ-78"         # separate issue for meetings (optional)
    #   min_granularity_min: 15                # round up to 15min
    #   comment_format: "{description}"         # free-form
    #
    # ClientProject:
    #   tempo_task_default: "PROJ-42"
    #   min_granularity_min: 15
    #   log_as_single_block: true              # combine all entries into one daily block
    #   except_separate: ["Weekly Sync"]        # these meetings get their own entry
    #   comment_format: "{description} {client_jira_ref}"
    #   client_jira_ref: "CLIENT-123"           # reference to client's Jira
    #   notes: "At end of week, mirror hours to client Jira manually"

# === Teams Conversation Cache ===
# Discovered by /onboard via sidebar DOM scraping. Stable — IDs don't change.
# Re-run /onboard to refresh if you have new external contacts.
teams_conversations:
  # External chats (not returned by Teams API — discovered from sidebar DOM)
  external: []
    # Example (auto-populated by /onboard):
    # - name: "Jane Smith"
    #   id: "19:abc12345-def6-7890-abcd-ef1234567890_your-uuid@unq.gbl.spaces"
    #   email: "jane.smith@otherorg.com"
    #
    # - name: "Bob Jones"
    #   id: "19:fed09876-543a-210f-edcb-a09876543210_your-uuid@unq.gbl.spaces"
    #   email: "bob.jones@partner.com"

  # Internal chats are discovered automatically via API — no need to cache.
  # Only external chats need to be cached here because the API doesn't list them.

# === Data Sources ===
# Configure connected integrations

# Microsoft Graph API (for To Do + Teams)
# See docs/setup-guide.md for how to register an Azure Entra app
graph_api:
  # tenant_id: "your-tenant-id"
  # client_id: "your-client-id"
  # Scopes: Tasks.Read, Chat.Read, User.Read

# MCP servers used (for reference — actual config is in Claude Code settings)
mcp_servers:
  # atlassian: connected    # Jira + Confluence
  # ms365: connected        # Microsoft 365 (Softeria)
  # lokka: connected        # Microsoft Graph (Lokka)
  # gitlab: connected       # GitLab MRs/pipelines
